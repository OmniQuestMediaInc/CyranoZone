# WO: WO-CI-001
# Continuous Integration — ChatNow.Zone BUILD
# Triggers on every push to main and every PR targeting main so that the
# branch always shows a green status check instead of grey (no runs).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal permissions — jobs only need to read repository contents.
permissions:
  contents: read

jobs:
  restricted-paths:
    name: Restricted Paths Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
      - name: Fail-closed on restricted paths (ledger / consent / PII)
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "NOT_APPLICABLE: restricted path diff gate applies to pull_request events only."
            exit 0
          fi
          if [ -z "${{ github.event.pull_request.base.sha }}" ] || [ -z "${{ github.event.pull_request.head.sha }}" ]; then
            echo "❌ Missing pull_request base/head SHAs; fail-closed policy blocks merge."
            exit 1
          fi
          CHANGED_FILES="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"
          echo "$CHANGED_FILES"
          if echo "$CHANGED_FILES" | grep -Eqi '(^|/)(ledger|consent|pii)(/|$)'; then
            echo "❌ Restricted path touched (ledger/consent/PII). Fail-closed policy blocks merge."
            exit 1
          fi
          echo "✅ No restricted paths touched."

  # ---------------------------------------------------------------------------
  # Job 1: Validate SQL schema by actually applying it to a live PostgreSQL
  #        instance.  Proves the ledger schema is runnable at any commit.
  # ---------------------------------------------------------------------------
  validate-schema:
    name: Validate SQL Schema
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_USER: chatnow_app
          POSTGRES_DB: chatnow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Apply ledger schema
        env:
          PGPASSWORD: testpass
        run: |
          psql -v ON_ERROR_STOP=1 -h localhost -U chatnow_app -d chatnow \
               -f infra/postgres/init-ledger.sql && \
          echo "✅ Ledger schema applied successfully"

  # ---------------------------------------------------------------------------
  # Job 2: Assert that every required file is present.  Catches accidental
  #        deletions of governance, infra, or critical source files.
  # ---------------------------------------------------------------------------
  validate-structure:
    name: Validate Repository Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Check required files exist
        run: |
          all_ok=true
          while IFS= read -r f || [ -n "$f" ]; do
            # Skip blank lines and comments
            [[ -z "$f" || "$f" == \#* ]] && continue
            if [ -f "$f" ]; then
              echo "✅  $f"
            else
              echo "❌  MISSING: $f"
              all_ok=false
            fi
          done < .github/required-files.txt
          $all_ok || exit 1

  # ---------------------------------------------------------------------------
  # Job 3: Workspace quality — install + format:check + lint + typecheck +
  #        test. Gates every PR with the same checks deploy.yml runs against
  #        main, so red is caught before merge.
  # ---------------------------------------------------------------------------
  workspace-quality:
    name: Workspace Quality (lint / typecheck / format / test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [restricted-paths]

    env:
      # prisma validate needs a value but never connects during typecheck/test.
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Node.js
        uses: actions/setup-node@1a4442cacd436585916779262731d5b162bc6ec7 # v3.8.2
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies (frozen lockfile)
        run: yarn install --frozen-lockfile

      - name: Prisma generate
        run: yarn prisma:generate

      - name: Prisma validate
        run: yarn prisma validate

      - name: Lint parity gate (Python + JS/TS)
        run: yarn lint:ci

      - name: Typecheck
        run: yarn typecheck
      - name: Lint CI (eslint + prettier + tsc)
        run: yarn lint:ci

      - name: Test (jest)
        run: yarn test

  # ---------------------------------------------------------------------------
  # Job 4: Ship-gate verifier — fails CI if any L0 invariant is violated.
  # ---------------------------------------------------------------------------
  ship-gate:
    name: Ship-Gate Verifier
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [workspace-quality]

    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Node.js
        uses: actions/setup-node@1a4442cacd436585916779262731d5b162bc6ec7 # v3.8.2
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies (frozen lockfile)
        run: yarn install --frozen-lockfile

      - name: Run ship-gate verifier
        run: yarn ship-gate
