# CodeQL Code Scanning — ChatNow.Zone BUILD
# Runs static analysis on JavaScript/TypeScript source on every push to main,
# every PR targeting main, and on a weekly schedule.
#
# NOTE: Uploading results to GitHub Code Scanning requires the feature to be
# enabled at the repository level (Settings → Code security → Code scanning).
# Until that is enabled the upload step is best-effort and will not fail the
# job; SARIF results are always retained as a workflow artifact.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1' # Every Monday at 03:00 UTC

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: read

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript
          output: sarif-results
          upload: never

      - name: Upload SARIF as workflow artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codeql-sarif-results
          path: sarif-results
          retention-days: 30

      - name: Upload SARIF to Code Scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-results
          category: /language:javascript-typescript
