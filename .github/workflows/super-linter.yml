---
name: Lint (Super-Linter)

on: # yamllint disable-line rule:truthy
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: read
  statuses: write

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  super-linter:
    name: Super-Linter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history required)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Super-Linter (targeted validators)
        uses: super-linter/super-linter@v8.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Only run what this repo is currently using in CI
          VALIDATE_YAML: true
          VALIDATE_JSON: true
          VALIDATE_MARKDOWN: true

          # Reduce noise/churn and prevent scanning build artifacts
          VALIDATE_ALL_CODEBASE: false
          IGNORE_GITIGNORED_FILES: true

          # Restrict linting to root files, .github, and docs/ only
          # Matches: .github/**, docs/**, and root-level *.md, *.yml, *.yaml, *.json files
          # Excludes: src/, api/, infra/, archive/, LEGACY_CONFIGS/, services/, tests/, ui/
          FILTER_REGEX_INCLUDE: ^(\.github/|docs/|[^/]+\.(md|yml|yaml|json)$)

          # Belt-and-suspenders: keep heavy / irrelevant trees out even if regex widens later
          FILTER_REGEX_EXCLUDE: (^|/)(LEGACY_CONFIGS|archive|node_modules|dist|\.next|out)/

          # Config directory for super-linter template discovery
          LINTER_RULES_PATH: .github/linters

          # Ensure regexes apply to repo-relative paths
          STRIP_DEFAULT_WORKSPACE_FOR_REGEX: true

          # Valid values: ERROR, WARN, NOTICE, INFO, DEBUG (VERBOSE is not accepted)
          LOG_LEVEL: DEBUG
