---
name: Lint (Super-Linter)

on: # yamllint disable-line rule:truthy
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: read
  statuses: write

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  super-linter:
    name: Super-Linter
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || (!startsWith(github.head_ref, 'copilot/') && !startsWith(github.head_ref, 'grok/') && !startsWith(github.head_ref, 'agent/'))

    steps:
      - name: Checkout (full history required)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Super-Linter (canonical mixed-language validators)
        uses: super-linter/super-linter@v8.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Canonical baseline validators
          VALIDATE_YAML: true
          VALIDATE_JSON: true
          VALIDATE_MARKDOWN: true
          VALIDATE_PYTHON: true
          VALIDATE_JAVASCRIPT_ES: true
          VALIDATE_TYPESCRIPT_ES: true
          VALIDATE_ESLINT: true

          # Reduce noise/churn and prevent scanning build artifacts
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_YAML_ALL_CODEBASE: false
          YAMLVALIDATE_ALL_CODEBASE: false
          IGNORE_GITIGNORED_FILES: true

          # Restrict linting to non-code governance/docs + root-level config/source files.
          FILTER_REGEX_INCLUDE: ^(\.github/|docs/|PROGRAM_CONTROL/|[^/]+\.(md|yml|yaml|json|ts|js)$)

          # Belt-and-suspenders: keep heavy / irrelevant trees out even if regex widens later
          FILTER_REGEX_EXCLUDE: (^|/)(LEGACY_CONFIGS|archive|node_modules|dist|\.next|out)/

          # Config directory for super-linter template discovery
          LINTER_RULES_PATH: .github/linters

          # Ensure regexes apply to repo-relative paths
          STRIP_DEFAULT_WORKSPACE_FOR_REGEX: true

          # Valid values: ERROR, WARN, NOTICE, INFO, DEBUG (VERBOSE is not accepted)
          LOG_LEVEL: DEBUG
