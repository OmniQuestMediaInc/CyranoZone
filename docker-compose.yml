# WO: WO-032 / FT-033 / PAYLOAD-9
# FT-033: Postgres and Redis are isolated to the internal backend network.
#         No host port bindings for db or redis — internal traffic only.
# PAYLOAD-9: Env-var driven configuration only. No hard-coded secrets.
#            All Payload 1–8 services routed through the `api` process boundary:
#            GateGuard, Flicker n'Flame Scoring (FFS), CreatorControl, Cyrano, Diamond Concierge,
#            Recovery, Immutable Audit, and Integration Hub are NestJS modules
#            mounted inside the `api` composite runtime (see
#            services/core-api/src/app.module.ts). A dedicated service row
#            per module is only created when horizontal scaling is enabled —
#            the Business Plan §G.6 AWS topology documents this path.
services:
  db:
    image: postgres:16-alpine
    container_name: chatnow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chatnow}
      POSTGRES_USER: ${POSTGRES_USER:-chatnow_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    # PORTS REMOVED: Internal network only. (FT-033 — NETWORK ISOLATION invariant)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-ledger.sql:/docker-entrypoint-initdb.d/01-init-ledger.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-chatnow_app} -d ${POSTGRES_DB:-chatnow}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: chatnow_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    # PORTS REMOVED: Internal network only. (FT-033 — NETWORK ISOLATION invariant)
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  nats:
    image: nats:2.10-alpine
    container_name: chatnow_nats
    restart: unless-stopped
    # INFRA: NATS.io message fabric — all chat and haptic events route through here.
    # Latency Invariant: REST polling is prohibited. All real-time events via NATS.
    command: >
      -js
      -sd /data
      -m 8222
    ports:
      - '4222:4222'
      - '8222:8222'
    volumes:
      - nats_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8222/healthz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  api:
    # Core API monolith — hosts all NestJS modules including:
    # GateGuard, Flicker n'Flame Scoring (FFS), CreatorControl, Cyrano, Audit, Recovery,
    # Integration Hub, Ledger, DFSP, Bijou, ShowZone, OBS-Bridge,
    # Scheduling, Membership, Risk Engine, Geo, Games, Zone-GPT.
    build:
      context: ./services/core-api
      dockerfile: Dockerfile
    container_name: chatnow_api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${API_PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-chatnow_app}:${DB_PASSWORD}@db:5432/${POSTGRES_DB:-chatnow}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NATS_URL: nats://nats:4222
      # Canonical module feature flags — defaults ON for production bring-up.
      # Payload 1–8 modules are mounted inside the api composite runtime.
      LEDGER_ENABLED: ${LEDGER_ENABLED:-true}
      GATEGUARD_ENABLED: ${GATEGUARD_ENABLED:-true}
      RECOVERY_ENABLED: ${RECOVERY_ENABLED:-true}
      DIAMOND_CONCIERGE_ENABLED: ${DIAMOND_CONCIERGE_ENABLED:-true}
      FFS_ENABLED: ${FFS_ENABLED:-true}
      CREATOR_CONTROL_ENABLED: ${CREATOR_CONTROL_ENABLED:-true}
      CYRANO_ENABLED: ${CYRANO_ENABLED:-true}
      INTEGRATION_HUB_ENABLED: ${INTEGRATION_HUB_ENABLED:-true}
      AUDIT_IMMUTABLE_ENABLED: ${AUDIT_IMMUTABLE_ENABLED:-true}
      STREAMING_ENABLED: ${STREAMING_ENABLED:-true}
      # Third-party integration keys — NEVER commit values.
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:?STRIPE_SECRET_KEY is required}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:?ELEVENLABS_API_KEY is required}
      FLUX_API_KEY: ${FLUX_API_KEY:?FLUX_API_KEY is required}
      # Webhook signing + RBAC step-up — NEVER commit values.
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET:?WEBHOOK_SIGNING_SECRET is required}
      RBAC_STEP_UP_SIGNING_SECRET: ${RBAC_STEP_UP_SIGNING_SECRET:?RBAC_STEP_UP_SIGNING_SECRET is required}
    ports:
      - '${API_PORT:-3000}:3000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:3000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend

  # ── Cyrano Standalone — Next.js UI ────────────────────────────────────────
  # Run the Next.js cyrano-standalone app on port 3100.
  # Connects to the api service for all Cyrano/AI endpoints.
  cyrano-ui:
    build:
      context: ./apps/cyrano-standalone
      dockerfile: Dockerfile
    container_name: cyrano_ui
    restart: unless-stopped
    environment:
      CYRANO_CORE_API_URL: ${CYRANO_CORE_API_URL:-http://api:3000}
      NEXT_PUBLIC_CYRANO_API_URL: ${NEXT_PUBLIC_CYRANO_API_URL:-http://localhost:3000}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - '3100:3100'
    depends_on:
      api:
        condition: service_healthy
    networks:
      - backend
    # CYR: run with `yarn dev:cyrano` in development; this service is for prod.

  # ── Cyrano AI Worker — Banana.dev LoRA Training Webhook Handler ───────────
  # SCAFFOLD — receives Banana.dev training completion callbacks and updates
  # AiTwin records. Runs as a lightweight worker process.
  # Uncomment and provide Dockerfile when Banana.dev integration is active.
  #
  # ai-twin-worker:
  #   build:
  #     context: ./services/ai-twin
  #     dockerfile: Dockerfile
  #   container_name: cyrano_ai_twin_worker
  #   restart: unless-stopped
  #   environment:
  #     DATABASE_URL: ${DATABASE_URL}
  #     NATS_URL: ${NATS_URL:-nats://nats:4222}
  #     BANANA_API_KEY: ${BANANA_API_KEY}
  #     BANANA_API_ENDPOINT: ${BANANA_API_ENDPOINT}
  #     AI_TWIN_LORA_RANK: ${AI_TWIN_LORA_RANK:-16}
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #     nats:
  #       condition: service_healthy
  #   networks:
  #     - backend

  # ── Portal Services — One Engine, Multiple Brand Portals ──────────────────
  # Each portal is a lightweight Next.js app that shares the same core API.
  # NEXT_PUBLIC_PORTAL drives brand theming; NEXT_PUBLIC_API_URL points at
  # the shared api service. Portal Dockerfiles live in apps/portals/<name>/.
  # Ports follow the convention: main=3001, ink-and-steel=3002,
  #   lotus-bloom=3003, desperate-housewives=3004, barely-legal=3005,
  #   dark-desires=3006.

  portal-main:
    build:
      context: ./apps/portals/main
      dockerfile: Dockerfile
    container_name: cyrano_portal_main
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_PORTAL: MAIN
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - '3001:3000'
    depends_on:
      api:
        condition: service_healthy
    networks:
      - backend

  portal-ink-and-steel:
    build:
      context: ./apps/portals/ink-and-steel
      dockerfile: Dockerfile
    container_name: cyrano_portal_ink_and_steel
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_PORTAL: INK_AND_STEEL
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - '3002:3000'
    depends_on:
      api:
        condition: service_healthy
    networks:
      - backend

  portal-lotus-bloom:
    build:
      context: ./apps/portals/lotus-bloom
      dockerfile: Dockerfile
    container_name: cyrano_portal_lotus_bloom
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_PORTAL: LOTUS_BLOOM
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - '3003:3000'
    depends_on:
      api:
        condition: service_healthy
    networks:
      - backend

  portal-desperate-housewives:
    build:
      context: ./apps/portals/desperate-housewives
      dockerfile: Dockerfile
    container_name: cyrano_portal_desperate_housewives
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_PORTAL: DESPERATE_HOUSEWIVES
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - '3004:3000'
    depends_on:
      api:
        condition: service_healthy
    networks:
      - backend

  portal-barely-legal:
    build:
      context: ./apps/portals/barely-legal
      dockerfile: Dockerfile
    container_name: cyrano_portal_barely_legal
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_PORTAL: BARELY_LEGAL
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - '3005:3000'
    depends_on:
      api:
        condition: service_healthy
    networks:
      - backend

  portal-dark-desires:
    build:
      context: ./apps/portals/dark-desires
      dockerfile: Dockerfile
    container_name: cyrano_portal_dark_desires
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_PORTAL: DARK_DESIRES
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - '3006:3000'
    depends_on:
      api:
        condition: service_healthy
    networks:
      - backend

volumes:
  postgres_data:
  redis_data:
  nats_data:

networks:
  backend:
    driver: bridge
